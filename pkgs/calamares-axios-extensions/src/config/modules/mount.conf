---
extraMounts:
    - device: proc
      fs: proc
      mountPoint: /proc
    - device: sys
      fs: sysfs
      mountPoint: /sys
    - device: /dev
      fs: bind
      mountPoint: /dev
    - device: tmpfs
      fs: tmpfs
      mountPoint: /run
    - device: /run/udev
      fs: bind
      mountPoint: /run/udev
    - device: efivarfs
      fs: efivarfs
      mountPoint: /sys/firmware/efi/efivars
      efi: true

btrfsSubvolumes:
    - mountPoint: /
      subvolume: ""
    - mountPoint: /home
      subvolume: /home
    - mountPoint: /nix
      subvolume: /nix

mountOptions:
    - filesystem: efi
      options: [ fmask=0077, dmask=0077 ]
    - filesystem: btrfs
      options: [ compress=zstd, noatime ]
